<h2>Dashboard</h2>

<section class="cards">
  <mat-card class="count-card total">
    <mat-card-header>
      <mat-card-title>{{ totalCount }}</mat-card-title>
      <mat-card-subtitle>Total Tickets</mat-card-subtitle>
    </mat-card-header>
  </mat-card>

  @for (status of statuses; track status) {
    <mat-card class="count-card">
      <mat-card-header>
        <mat-card-title>{{ statusCounts[status] || 0 }}</mat-card-title>
        <mat-card-subtitle>{{ status }}</mat-card-subtitle>
      </mat-card-header>
    </mat-card>
  }
</section>

<h3>By Priority</h3>
<section class="cards">
  @for (priority of priorities; track priority) {
    <mat-card class="count-card" [class]="priority.toLowerCase()">
      <mat-card-header>
        <mat-card-title>{{ priorityCounts[priority] || 0 }}</mat-card-title>
        <mat-card-subtitle>{{ priority }}</mat-card-subtitle>
      </mat-card-header>
    </mat-card>
  }
</section>
