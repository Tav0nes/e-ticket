<mat-card>
  <mat-card-header>
    <mat-card-title>Edit Ticket</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="4"></textarea> 
      </mat-form-field>

      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            @for (s of statusOptions; track s) {
              <mat-option [value]="s">{{ s }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Priority</mat-label>
          <mat-select formControlName="priority">
            @for (p of priorityOptions; track p) {
              <mat-option [value]="p">{{ p }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <input matInput formControlName="category" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Assignee ID</mat-label>
        <input matInput formControlName="assigneeId" />
      </mat-form-field>

      <div class="actions">
        <a mat-button [routerLink]="['/tickets', ticketId]">Cancel</a>
        <button mat-flat-button type="submit" [disabled]="form.invalid">Save Changes
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
