<h2>Tickets</h2>

<section class="filters">
  <label>Status:</label>
  <mat-chip-set>
    @for (s of statusOptions; track s) {
      <mat-chip [highlighted]="activeStatusFilter === s" (click)="filterByStatus(s)">
        {{ s }}
      </mat-chip>
    }
  </mat-chip-set>

  <label>Priority:</label>
  <mat-chip-set>
    @for (p of priorityOptions; track p) {  
      <mat-chip [highlighted]="activePriorityFilter === p" (click)="filterByPriority(p)">
        {{ p }}
      </mat-chip>
    } 
  </mat-chip-set>
</section>

<table mat-table [dataSource]="filteredTickets" class="mat-elevation-z2">
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> Title </th>
    <td mat-cell *matCellDef="let ticket">
      <a [routerLink]="['/tickets', ticket.id]">
        {{ ticket.title }}</a>
    </td> 
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.status }} </td>  
  </ng-container>

  <ng-container matColumnDef="priority">
    <th mat-header-cell *matHeaderCellDef> Priority </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.priority }} </td>
  </ng-container> 

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef> Created At </th>
    <td mat-cell *matCellDef="let ticket"> {{ ticket.createdAt | date:'short' }} </td>
  </ng-container> 

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>  
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

@if (filteredTickets.length === 0) {
  <p class="empty-message">No tickets found.</p>
}
