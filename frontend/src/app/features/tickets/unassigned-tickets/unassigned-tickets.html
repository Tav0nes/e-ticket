<header class="page-header">
  <div class="page-header__title-group">
    <mat-icon class="page-header__icon">person_off</mat-icon>
    <h2 class="page-header__title">Unassigned Tickets</h2>
  </div>

  <mat-form-field appearance="outline" class="page-header__filter" subscriptSizing="dynamic">
    <mat-label>Status</mat-label>
    <mat-select [value]="statusFilter()" (selectionChange)="statusFilter.set($event.value)">
      @for (s of statuses; track s) {
        <mat-option [value]="s">{{ s }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</header>

<div class="content">
  @if (unassigned().length === 0) {
    <div class="empty-state">No Unassigned Tickets</div>
  } @else {
    <table mat-table [dataSource]="unassigned()" class="tickets-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let t">
          <a [routerLink]="['/tickets', t.id]">{{ t.title }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="reporter">
        <th mat-header-cell *matHeaderCellDef>Reporter</th>
        <td mat-cell *matCellDef="let t"> {{ t.reporterId || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let t"> {{ t.status }}</td>
      </ng-container>
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef>Priority</th>
        <td mat-cell *matCellDef="let t"> {{ t.priority }}</td>
      </ng-container>
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created At</th>
        <td mat-cell *matCellDef="let t"> {{ t.createdAt | date:'short' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
